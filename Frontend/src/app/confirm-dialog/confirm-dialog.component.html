<h2 mat-dialog-title>{{title}}</h2>
<mat-dialog-content>{{content}}</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close class="cancel-button">{{cancel}}</button>
  <button mat-button [mat-dialog-close]="true" class="confirm-button">{{delete}}</button>
</mat-dialog-actions>
