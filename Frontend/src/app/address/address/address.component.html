<!-- Utilisation de flexbox pour aligner les éléments -->
<div class="address-header">
  <!-- Champ de filtre -->
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input />
  </mat-form-field>

  <!-- Bouton Add Address -->
  <button mat-raised-button class="add-button" (click)="openDialog()">
    <mat-icon class="mr-2">add_location</mat-icon>
    <span class="button-text">Add Address</span>
  </button>
</div>

<!-- Conteneur de la table -->
<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort class="styled-table">
    <!-- City Column -->
    <ng-container matColumnDef="city">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
      <td mat-cell *matCellDef="let row">{{ row.city }}</td>
    </ng-container>

    <!-- Street Column -->
    <ng-container matColumnDef="street">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Street</th>
      <td mat-cell *matCellDef="let row">{{ row.street }}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="warn" (click)="openDeleteDialog(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button color="primary" (click)="edit(row)">
          <mat-icon>edit</mat-icon>
        </button>


      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- No Data Row -->
    <tr class="mat-row no-data-row" *matNoDataRow>
      <td class="mat-cell" colspan="2">No results match your filter "{{ input.value }}"</td>
    </tr>
  </table>

  <!-- Pagination -->
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of addresses"></mat-paginator>
</div>
