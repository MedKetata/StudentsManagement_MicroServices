<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <!-- Filter Input -->
    <div class="form-group w-50">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="search" #input>
      </mat-form-field>
    </div>

    <!-- Add Student Button -->
    <button mat-raised-button style="background-color: #00bcd4; color: white; border-radius: 25px; font-size: 1rem; font-weight: bold; text-transform: uppercase; padding: 10px 20px;"(click)="openDialog()">
        <mat-icon class="mr-2">person_add</mat-icon>
        <span class="button-text"> New Student</span>
    </button>


  </div>

  <!-- Table with Angular Material and Bootstrap -->
  <div class="mat-elevation-z8 table-responsive shadow-sm">
    <table mat-table [dataSource]="dataSource" matSort class="table table-bordered table-striped">
      <thead class="thead-dark">
        <!-- First Name Column -->
        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
          <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
        </ng-container>

        <!-- Last Name Column -->
        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
          <td mat-cell *matCellDef="let row">{{ row.lastName }}</td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let row">{{ row.email }}</td>
        </ng-container>

        <!-- City Column -->
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
          <td mat-cell *matCellDef="let row">{{ row.city }}</td>
        </ng-container>

        <!-- Street Column -->
        <ng-container matColumnDef="street">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Street</th>
          <td mat-cell *matCellDef="let row">{{ row.street }}</td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let row">

            <button mat-icon-button color="primary" (click)="edit(row)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="delete(row.id)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>
      </thead>

      <tbody>
        <!-- Table Rows -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No Data Row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center" colspan="6"> No results match your filter "{{ input.value }}"</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users">
    </mat-paginator>
  </div>
</div>
